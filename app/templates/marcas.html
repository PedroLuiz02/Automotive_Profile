<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/marcas.css') }}">
    <title>Auto Profile - Marcas</title>
</head>
<body>
    <section class="hero">
        <header>
            <a href="/"><h2>Auto Profile</h2></a>
            <a href="/"><img src="{{ url_for('static', filename='img/back-arrow.png') }}"></a>
        </header>
        <div class="container">
                {% for marca in marcas %}
                <a href="/carros">
                    <div class="cards">
                        <div class="marca-card">
                            <img src="{{ url_for('static', filename='img/logos/' ~ marca.imagem) }}" alt="{{ marca.nome }}">
    
                            <h2>{{ marca.nome }}</h2>
                        </div>
                    </div>
                </a>
                {% endfor %}
        </div>
    </section>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</html>
